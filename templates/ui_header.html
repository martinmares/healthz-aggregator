<div
  id="header-badges"
  class="d-flex align-items-center gap-2 flex-wrap"
  hx-get="/ui/fragment/header"
  hx-trigger="every {{ refresh_hx }}"
  hx-swap="outerHTML"
>
  {% if aggregate_ok %}
    <span class="badge bg-success-lt">aggregate: <span class="fw-semibold">OK</span></span>
  {% else %}
    <span class="badge bg-danger-lt">aggregate: <span class="fw-semibold">FAILED</span></span>
  {% endif %}

  <span class="badge bg-secondary-lt">uptime: <span class="font-monospace">{{ uptime }}</span></span>
  <span class="badge bg-secondary-lt">refresh: <span class="font-monospace">{{ refresh_interval }}</span></span>
  <span class="badge bg-secondary-lt">
    updated:
    <time class="font-monospace js-localtime" datetime="{{ now }}">{{ now }}</time>
  </span>
</div>
