[package]
name = "healthz-aggregator"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8"
tokio = { version = "1.38", features = ["rt-multi-thread", "macros", "time"] }

serde = { version = "1.0", features = ["derive"] }
serde_yaml_ng = "0.10"

humantime = "2.3"
humantime-serde = "1.1"

anyhow = "1.0"

reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

prometheus = "0.14"
once_cell = "1.19"
futures = "0.3"

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
time = { version = "0.3.44", features = ["formatting", "serde"] }
